<!DOCTYPE html>
<html>
<head>
    <title>Google Docs</title> <link rel="stylesheet" href="index.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="uv/uv.bundle.js" defer></script>
    <script src="uv/uv.config.js" defer></script>
    <script src="register-sw.js" defer></script>
</head>
<body>
    <div class="background-animation"></div>
    <div class="glass-container">
        <h1>Private Browser</h1>
        <p>Enter a URL to browse freely.</p>
        <form id="uv-form">
            <input id="uv-address" type="text" placeholder="Search Google or type a URL..." autocomplete="off">
        </form>
        <div class="desc">
            <span>Encrypted Connection</span>
            <span id="uv-error"></span>
        </div>
    </div>
    <script src="index.js" defer></script>
</body>
</html>
